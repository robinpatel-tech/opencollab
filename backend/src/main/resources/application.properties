spring.application.name=backend
# Database
spring.datasource.url=jdbc:mysql://localhost:3306/opencollab_db
spring.datasource.username=root
spring.datasource.password=window
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# JWT secret (change this to any long random string)
jwt.secret=opencollab_super_secret_key_change_this_in_production
jwt.expiration=86400000

# Server port
server.port=8080